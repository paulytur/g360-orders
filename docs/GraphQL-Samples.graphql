# --- Pizzas ---
query GetPizzas {
  getPizzas(code: null, type: null, size: null, pageNumber: 1, pageSize: 10, includeDeleted: false) {
    success
    messages
    page
    pageSize
    totalCount
    data {
      id
      code
      type
      size
      price
      isDeleted
      createdBy
      createdDatetime
    }
  }
}

query GetPizzaById {
  getPizzaById(id: 1) {
    success
    messages
    data { id code type size price }
  }
}

# --- Pizza Types ---
query GetPizzaTypes {
  getPizzaTypes(code: null, categoryId: null, pageNumber: 1, pageSize: 10, includeDeleted: false) {
    success
    messages
    page
    pageSize
    totalCount
    data {
      id
      code
      name
      categoryId
      isDeleted
      createdBy
      createdDatetime
      category { id name }
      pizzaDetails { id ingredientId ingredient { id description } }
    }
  }
}

query GetPizzaTypeById {
  getPizzaTypeById(id: 1) {
    success
    messages
    data { id code name categoryId category { name } }
  }
}


# ========== MUTATIONS ==========

# --- Orders ---
mutation CreateOrder {
  createOrder(input: {
    items: [
      { pizzaId: 1, quantity: 2 }
      { pizzaId: 2, quantity: 1 }
    ]
  }) {
    success
    messages
    data { id orderDetails { pizzaId quantity } }
  }
}

mutation UpdateOrder {
  updateOrder(id: 1, input: {
    items: [
      { pizzaId: 1, quantity: 3 }
      { pizzaId: 2, quantity: 2 }
    ]
  }) {
    success
    messages
    data { id orderDetails { pizzaId quantity } }
  }
}

mutation DeleteOrder {
  deleteOrder(id: 1) {
    success
    messages
  }
}

