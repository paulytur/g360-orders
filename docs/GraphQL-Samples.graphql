# G360 Orders – GraphQL sample queries and mutations
# Set header: X-User-Id = your-user-id (required for all requests except introspection)

# ========== QUERIES ==========

# --- Orders ---
query GetOrders {
  getOrders(pageNumber: 1, pageSize: 10, includeDeleted: false) {
    success
    messages
    page
    pageSize
    totalCount
    data {
      id
      isDeleted
      createdBy
      createdDatetime
      updatedBy
      updatedDatetime
      orderDetails {
        id
        orderId
        pizzaId
        quantity
      }
    }
  }
}

query GetOrderById {
  getOrderById(id: 1) {
    success
    messages
    data {
      id
      orderDetails { id pizzaId quantity }
    }
  }
}

# --- Insights (counts, revenue, trends, peak hours, top-selling pizza) ---
query GetInsights {
  # Optional: omit startDate/endDate to use last 30 days to now
  getInsights(
    startDate: "2025-02-01T00:00:00Z"
    endDate: "2025-03-14T23:59:59Z"
  ) {
    success
    messages
    data {
      totalOrders
      totalRevenue
      totalPizzasSold
      averageOrderValue
      entityCounts {
        orders
        pizzas
        pizzaTypes
        ingredients
        categories
      }
      revenueOverview {
        totalRevenue
        periodRevenue
        startDate
        endDate
      }
      topSellingPizza {
        pizzaId
        pizzaCode
        pizzaType
        pizzaSize
        unitPrice
        totalQuantitySold
        revenue
      }
      dailySalesTrend {
        date
        orderCount
        revenue
      }
      peakHours {
        hour
        orderCount
        revenue
      }
      salesByCategory {
        categoryName
        orderCount
        quantitySold
        revenue
      }
      weeklyAnalysis {
        weekStart
        orderCount
        revenue
      }
    }
  }
}

# --- Ingredients ---
